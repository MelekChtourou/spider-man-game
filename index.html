<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web-Swing Prototype</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: block;
        outline: none;
        touch-action: none;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 12px;
        height: 12px;
        margin: -6px 0 0 -6px;
        border: 2px solid white;
        border-radius: 50%;
        pointer-events: none;
        mix-blend-mode: difference;
        opacity: 0.85;
      }
      #hint {
        position: fixed;
        bottom: 16px;
        left: 16px;
        color: white;
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.5;
        pointer-events: none;
        mix-blend-mode: difference;
      }
      #hint kbd {
        background: rgba(255, 255, 255, 0.18);
        padding: 1px 6px;
        border-radius: 3px;
        font-family: ui-monospace, monospace;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="crosshair"></div>
    <div id="hint">
      Move: <kbd>Z Q S D</kbd> / <kbd>W A S D</kbd> / arrows &nbsp;·&nbsp;
      Jump: <kbd>Space</kbd> &nbsp;·&nbsp;
      Swing: hold <kbd>J</kbd> (left hand) or <kbd>L</kbd> (right hand) &nbsp;·&nbsp;
      Steer mid-swing: <kbd>Q</kbd> / <kbd>D</kbd>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
