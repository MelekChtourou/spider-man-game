name: Deploy to VPS

# Triggers:
#   - Every push to main or the current development branch
#   - Manual run via the "Run workflow" button in the GitHub UI
on:
  push:
    branches:
      - main
      - claude/**
  workflow_dispatch:

# Concurrency: cancel any in-flight deploy when a newer one is queued.
# Avoids racing rsync overwrites and spurious systemd restarts.
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite → dist/)
        run: npm run build

      - name: Configure SSH for VPS
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pre-trust the VPS host key so rsync doesn't prompt.
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Sync dist/ to the VPS deploy path. --delete removes stale files.
      # The trailing slashes on both src and dst are intentional: copy the
      # *contents* of dist/, not dist/ itself.
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/"

      # Static server doesn't strictly need a restart since `serve` reads
      # files from disk on each request, but reloading systemd resets any
      # in-flight problems and keeps logs cleanly delineated per-deploy.
      - name: Restart static service (best-effort)
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo systemctl restart oiiai.service"

      - name: Smoke-test HTTP response
        continue-on-error: true
        run: |
          sleep 2
          curl -s -o /dev/null -w "deploy → HTTP %{http_code}\n" \
            "http://${{ secrets.VPS_HOST }}:${{ secrets.VPS_PORT || '8080' }}/"
