<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#d92638" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Spider-Man Game</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: block;
        outline: none;
        touch-action: none;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 12px;
        height: 12px;
        margin: -6px 0 0 -6px;
        border: 2px solid white;
        border-radius: 50%;
        pointer-events: none;
        mix-blend-mode: difference;
        opacity: 0.85;
      }
      #hint {
        position: fixed;
        bottom: 16px;
        left: 16px;
        color: white;
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.5;
        pointer-events: none;
        mix-blend-mode: difference;
      }
      #fps {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
        color: white;
        background: rgba(0, 0, 0, 0.45);
        padding: 4px 8px;
        border-radius: 4px;
        font: 600 13px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        pointer-events: none;
        mix-blend-mode: difference;
        font-variant-numeric: tabular-nums;
        z-index: 20;
      }
      #hint kbd {
        background: rgba(255, 255, 255, 0.18);
        padding: 1px 6px;
        border-radius: 3px;
        font-family: ui-monospace, monospace;
      }

      /* ---------- Touch UI (only mounted on touch devices) ---------- */
      #touch-ui {
        position: fixed;
        inset: 0;
        pointer-events: none; /* the children opt in individually */
        z-index: 10;
      }
      /* Right-half drag area for camera orbit. Behind the buttons. */
      #touch-cam {
        position: absolute;
        top: 0;
        right: 0;
        width: 50%;
        height: 100%;
        pointer-events: auto;
        touch-action: none;
      }
      /* Virtual joystick zone — bottom-left thumb */
      #touch-stick {
        position: absolute;
        left: calc(env(safe-area-inset-left, 0px) + 24px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
        width: 140px;
        height: 140px;
        pointer-events: auto;
        touch-action: none;
      }
      /* Right-thumb action cluster */
      #touch-buttons {
        position: absolute;
        right: calc(env(safe-area-inset-right, 0px) + 24px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        pointer-events: none;
      }
      #touch-buttons #btn-row {
        display: flex;
        flex-direction: row;
        gap: 12px;
      }
      #touch-buttons button {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.55);
        background: rgba(255, 255, 255, 0.10);
        color: white;
        font: 600 18px/1 system-ui, sans-serif;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        pointer-events: auto;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.06s, background 0.06s;
      }
      #touch-buttons button:active {
        transform: scale(0.92);
        background: rgba(255, 255, 255, 0.25);
      }
      #touch-buttons #btn-jump {
        font-size: 26px;
      }

      /* Hide the keyboard hint on touch devices to give the UI more room */
      @media (hover: none) and (pointer: coarse) {
        #hint { display: none; }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="crosshair"></div>
    <div id="fps">— FPS</div>
    <div id="hint">
      Move: <kbd>Z Q S D</kbd> / <kbd>W A S D</kbd> / arrows &nbsp;·&nbsp;
      Jump: <kbd>Space</kbd> &nbsp;·&nbsp;
      Swing: hold <kbd>J</kbd> (left hand) or <kbd>L</kbd> (right hand) &nbsp;·&nbsp;
      Steer mid-swing: <kbd>Q</kbd> / <kbd>D</kbd>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
